# packages/packages.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Single source of truth for all packages across all platforms.
#
# The install script (scripts/install_packages.py) reads this file and
# installs packages using the right package manager for the current system.
# Use Repology (repology.org) to look up the correct package name per manager
# when adding new entries.
#
# ── Schema ───────────────────────────────────────────────────────────────────
#
#   id:           logical name you use to think about this package
#   description:  what it does
#   tags:         [bootstrap|core|dev|git|secrets|fonts|apps|shell|macos|linux|windows]
#   profiles:     [personal|work] — omit to apply to all profiles
#   machines:     [laptop|desktop|server|pi] — omit to apply to all machines
#   sources:
#     homebrew:   "name"  |  {name: str, cask: true}
#     apt:        "name"  |  {name: str, ppa: str}
#     dnf:        "name"  |  {name: str, group: true}
#     choco:      "name"
#     pi_apt:     "name"  — Pi-specific apt name; falls back to apt: if omitted
#   post_install:
#     completion:
#       zsh:  "command --args"  — run this, capture stdout → completion file
#
# ── Package manager selection ─────────────────────────────────────────────────
#
#   macOS:              always homebrew
#   Raspberry Pi:       always pi_apt (falls back to apt)
#   Windows:            always choco
#   Linux (non-Pi):
#     - packages with no homebrew entry  → always use apt/dnf
#     - prefer_system_packages = false   → homebrew (if installed), else apt/dnf
#     - prefer_system_packages = true    → apt/dnf first, homebrew as fallback
#
# ─────────────────────────────────────────────────────────────────────────────

packages:
  # ── Bootstrap ────────────────────────────────────────────────────────────────
  # Always installed via system package manager — needed before Homebrew works.

  - id: build-tools
    description: "Compiler toolchain and essential build utilities"
    tags: [bootstrap]
    sources:
      apt: build-essential
      dnf: { name: "Development Tools", group: true }
      pi_apt: build-essential

  - id: zsh
    description: "Z shell"
    tags: [bootstrap, shell]
    sources:
      apt: zsh
      dnf: zsh
      choco: zsh
      pi_apt: zsh
    # macOS ships with a recent zsh; no homebrew entry needed

  - id: gnupg
    description: "GNU Privacy Guard"
    tags: [bootstrap, secrets]
    sources:
      apt: gnupg
      dnf: gnupg2
      choco: gnupg
      pi_apt: gnupg

  - id: ca-certificates
    description: "CA certificates for TLS verification"
    tags: [bootstrap]
    sources:
      apt: ca-certificates
      dnf: ca-certificates
      pi_apt: ca-certificates

  - id: unzip
    description: "Zip extraction utility"
    tags: [bootstrap]
    sources:
      apt: unzip
      dnf: unzip
      pi_apt: unzip

  - id: openssh-server
    description: "OpenSSH server for remote access"
    tags: [bootstrap]
    machines: [server, pi]
    sources:
      apt: openssh-server
      dnf: openssh-server
      pi_apt: openssh-server

  # ── Core CLI tools ──────────────────────────────────────────────────────────

  - id: git
    description: "Distributed version control"
    tags: [core]
    sources:
      homebrew: git
      apt: git
      dnf: git
      choco: git
      pi_apt: git

  - id: curl
    description: "HTTP client"
    tags: [core]
    sources:
      homebrew: curl
      apt: curl
      dnf: curl
      choco: curl
      pi_apt: curl

  - id: wget
    description: "File downloader"
    tags: [core]
    sources:
      homebrew: wget
      apt: wget
      dnf: wget
      choco: wget

  - id: jq
    description: "Lightweight JSON processor"
    tags: [core]
    sources:
      homebrew: jq
      apt: jq
      dnf: jq
      choco: jq
      pi_apt: jq

  - id: ripgrep
    description: "Fast regex search (rg)"
    tags: [core]
    sources:
      homebrew: ripgrep
      apt: ripgrep
      dnf: ripgrep
      choco: ripgrep

  - id: fd
    description: "Fast file finder (fd)"
    tags: [core]
    sources:
      homebrew: fd
      apt: fd-find # named fd-find on Debian/Ubuntu
      dnf: fd-find # named fd-find on Fedora
      choco: fd

  - id: fzf
    description: "Fuzzy finder"
    tags: [core]
    sources:
      homebrew: fzf
      apt: fzf
      dnf: fzf
      choco: fzf

  - id: font-0xproto-nerd-font
    description: "0xProto font from Nerd Fonts"
    tags: [core]
    sources:
      homebrew: {name: font-0xproto-nerd-font, cask: true}
      choco: nerd-fonts-0xproto

  - id: eza
    description: "Modern replacement for ls"
    tags: [core]
    machines: [laptop, desktop, server]
    sources:
      homebrew: eza
      apt: eza
      dnf: eza
      choco: eza
    # Completions are bundled with the Homebrew formula → $(brew --prefix)/share/zsh/site-functions/_eza
    # and picked up automatically via the fpath entry in ~/.zshrc.

  - id: bat
    description: "cat with syntax highlighting"
    tags: [core]
    sources:
      homebrew: bat
      apt: bat
      dnf: bat
      choco: bat

  - id: zoxide
    description: "Smarter cd — learns your most-visited dirs (z command)"
    tags: [core]
    sources:
      homebrew: zoxide
      apt: zoxide
      dnf: zoxide
      choco: zoxide

  - id: tldr
    description: "Simplified man pages"
    tags: [core]
    machines: [laptop, desktop]
    sources:
      homebrew: tldr
      apt: tldr
      dnf: tealdeer # named tealdeer on Fedora
      choco: tldr

  - id: htop
    description: "Interactive process viewer"
    tags: [core]
    sources:
      homebrew: htop
      apt: htop
      dnf: htop
      choco: htop
      pi_apt: htop

  - id: tree
    description: "Directory tree viewer"
    tags: [core]
    sources:
      homebrew: tree
      apt: tree
      dnf: tree
      choco: tree
      pi_apt: tree

  - id: tmux
    description: "Terminal multiplexer"
    tags: [core]
    sources:
      homebrew: tmux
      apt: tmux
      dnf: tmux
      choco: tmux
      pi_apt: tmux

  - id: neovim
    description: "Hyperextensible Vim-based editor"
    tags: [core]
    machines: [laptop, desktop, server]
    sources:
      homebrew: neovim
      apt: neovim
      dnf: neovim
      choco: neovim

  - id: vim
    description: "Vi IMproved (lightweight fallback editor)"
    tags: [core]
    machines: [pi]
    sources:
      pi_apt: vim

  - id: age
    description: "Modern encryption tool (used by chezmoi for secrets)"
    tags: [core, secrets]
    machines: [laptop, desktop]
    sources:
      homebrew: age
      apt: age
      dnf: age
      choco: age

  - id: chezmoi
    description: "Dotfiles manager"
    tags: [core]
    sources:
      homebrew: chezmoi
      apt: chezmoi
      dnf: chezmoi
      choco: chezmoi

  # ── Development tools ───────────────────────────────────────────────────────

  - id: gh
    description: "GitHub CLI"
    tags: [dev]
    machines: [laptop, desktop]
    sources:
      homebrew: gh
      # apt/dnf: requires the GitHub CLI repo to be added first.
      # See: https://github.com/cli/cli/blob/trunk/docs/install_linux.md
      apt: gh
      dnf: gh
      choco: gh

  - id: delta
    description: "Syntax-highlighting pager for git diffs"
    tags: [dev, git]
    machines: [laptop, desktop]
    sources:
      homebrew: git-delta # named git-delta on Homebrew
      apt: git-delta
      dnf: git-delta
      choco: delta # named delta on Chocolatey

  - id: lazygit
    description: "TUI git client"
    tags: [dev, git]
    machines: [laptop, desktop]
    sources:
      homebrew: lazygit
      # no apt/dnf package — installed via homebrew on Linux
      choco: lazygit

  # ── Secrets management ───────────────────────────────────────────────────────

  - id: bitwarden-cli
    description: "Bitwarden CLI for personal secrets (bw)"
    tags: [secrets]
    profiles: [personal]
    machines: [laptop, desktop]
    sources:
      homebrew: bitwarden-cli
      choco: bitwarden-cli
      # no official apt/dnf package — homebrew is the recommended source

  - id: 1password-cli
    description: "1Password CLI for work secrets (op)"
    tags: [secrets]
    profiles: [work]
    machines: [laptop, desktop]
    sources:
      homebrew: 1password-cli
      choco: 1password-cli
      # apt/dnf: requires the 1Password apt/dnf repo to be added first.
      # See: https://developer.1password.com/docs/cli/get-started/

  # ── macOS-specific ──────────────────────────────────────────────────────────

  - id: mas
    description: "Mac App Store CLI"
    tags: [macos]
    machines: [laptop, desktop]
    sources:
      homebrew: mas

  # ── Fonts ──────────────────────────────────────────────────────────────────

  - id: font-jetbrains-mono-nerd
    description: "JetBrains Mono Nerd Font (terminal icons)"
    tags: [fonts]
    machines: [laptop, desktop]
    sources:
      homebrew: { name: font-jetbrains-mono-nerd-font, cask: true }
      choco: nerd-fonts-jetbrainsmono

  - id: font-fira-code-nerd
    description: "Fira Code Nerd Font"
    tags: [fonts]
    machines: [laptop, desktop]
    sources:
      homebrew: { name: font-fira-code-nerd-font, cask: true }
      choco: nerd-fonts-firacode

  # ── Linux desktop utilities ──────────────────────────────────────────────────

  - id: xclip
    description: "X11 clipboard utility"
    tags: [linux]
    machines: [laptop, desktop]
    sources:
      apt: xclip
      dnf: xclip
      pi_apt: xclip

  - id: wl-clipboard
    description: "Wayland clipboard utility (wl-copy / wl-paste)"
    tags: [linux]
    machines: [laptop, desktop]
    sources:
      apt: wl-clipboard
      dnf: wl-clipboard

  - id: net-tools
    description: "Networking utilities (ifconfig, etc.)"
    tags: [linux]
    machines: [laptop, desktop, server]
    sources:
      apt: net-tools
      dnf: net-tools
      pi_apt: net-tools

  # ── Windows-specific ─────────────────────────────────────────────────────────

  - id: cygwin
    description: "Unix-like environment for Windows"
    tags: [windows, shell]
    machines: [desktop]
    sources:
      choco: cygwin

  - id: windows-terminal
    description: "Modern terminal emulator for Windows"
    tags: [windows]
    machines: [desktop]
    sources:
      choco: microsoft-windows-terminal

  - id: git-credential-manager
    description: "Git credential helper for Windows"
    tags: [windows, git]
    machines: [desktop]
    sources:
      choco: git-credential-manager

  - id: 7zip
    description: "File archiver"
    tags: [windows]
    machines: [desktop]
    sources:
      choco: 7zip

