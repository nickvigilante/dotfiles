# Canonical read-only command/subcommand lists for Claude Code permissions.
#
# Consumed by home/dot_claude/settings.json.tmpl. Each base command's args are
# expanded across its heads: the vanilla form, the rtk-wrapped form (when rtk wraps
# it, per rtk_wraps), plus any extra_heads (git also gets `git -C *` and
# `chezmoi git`). Add a read-only subcommand ONCE here and every wrapper form is
# granted in lockstep -- this is what keeps rtk at 100% permission parity.
#
# A space before `*` is required for Claude Code prefix matching. A bare entry (no
# trailing ` *`) matches that exact invocation only. List ONLY read-only,
# non-mutating, non-exfiltrating subcommands. Heads like `git -C *` belong in
# extra_heads, NOT args.

[permissions]
# Base commands whose output rtk rewrites via its hook (source: `rtk --help`).
# Membership here grants a command its `rtk <cmd> ...` permission twin.
rtk_wraps = [
  "git",
  "gh",
  "glab",
  "aws",
  "psql",
  "pnpm",
  "find",
  "diff",
  "log",
  "dotnet",
  "docker",
  "kubectl",
  "oc",
  "grep",
  "rg",
  "wget",
  "wc",
  "ls",
  "tree",
  "read",
  "env",
  "jest",
  "vitest",
  "prisma",
  "tsc",
  "next",
  "lint",
  "prettier",
  "format",
  "playwright",
  "cargo",
  "npm",
  "npx",
  "curl",
  "ruff",
  "pytest",
  "mypy",
  "rake",
  "rubocop",
  "rspec",
  "pip",
  "go",
  "gt",
  "golangci-lint",
  "gradlew",
  "mvn",
]

# rtk-only coreutils twins: vanilla form is auto-allowed by Claude Code, so only
# Bash(rtk <tool> *) is needed. (du/df/ps retained from prior hand-maintained config.)
rtk_only_tools = [
  "ls",
  "tree",
  "read",
  "grep",
  "rg",
  "wc",
  "diff",
  "du",
  "df",
  "ps",
]

# Base command -> read-only arg patterns (everything after the command name).
# NOTE: scalar keys above must precede these sub-tables (TOML ordering rule).

[permissions.commands.git]
extra_heads = ["git -C *", "chezmoi git"]
args = [
  "log *",
  "diff *",
  "show *",
  "status *",
  "blame *",
  "tag -l*",
  "tag",
  "remote -v",
  "remote show *",
  "remote get-url *",
  "ls-files *",
  "stash list *",
  "rev-parse *",
  "describe *",
  "worktree list *",
  "for-each-ref *",
  "shortlog *",
  "reflog show *",
  "reflog",
  "check-ignore *",
  "rev-list *",
]

[permissions.commands.gh]
args = [
  "pr list *",
  "pr view *",
  "pr diff *",
  "pr checks *",
  "pr status *",
  "issue list *",
